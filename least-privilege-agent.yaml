# configs/least-privilege-agent.yaml
# Configuration for Workflow 1: Least-Privilege API Access Agent

agent:
  name: code-review-agent
  version: "1.0"
  description: "Reads GitHub PRs and posts security review comments. Read-only access only."

  permissions:
    github:
      scopes:
        - "pull_requests:read"
        - "issues:write"       # For posting review comments
      allow_merge: false
      allow_push: false
      allow_delete: false
      allow_admin: false

  rate_limits:
    github_api_calls_per_run: 100
    llm_calls_per_run: 20
    max_run_duration_seconds: 300   # 5 minute hard stop

  secrets:
    source: vault                          # Options: vault | aws_secrets_manager | azure_key_vault
    path: "agents/code-review/github-token"
    ttl: 3600                              # Token expires after 1 hour

  output_filters:
    strip_internal_paths: true
    strip_pii: true
    max_comment_length: 2000

  audit:
    enabled: true
    destination: splunk                    # Options: splunk | cloudwatch | datadog | stdout
    log_level: full                        # Options: full | metadata_only | errors_only
